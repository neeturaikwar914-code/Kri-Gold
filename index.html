<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Gold Price India</title>
</head>
<body>
    <h1>Live Gold Price in India</h1>
    <p>Get the latest updates on gold prices throughout the day!</p>
    <div id="gold-price">
        <!-- Gold price will be dynamically displayed here -->
    </div>
    <script>
        // Fetching live gold price data from an API or website
        // Example: Fetch from a Gold Price API
        setInterval(async () => {
            const response = await fetch('https://api.example.com/gold-price');
            const data = await response.json();
            document.getElementById('gold-price').innerText = `Current Gold Price: ₹${data.price}`;
        }, 60000); // Update every minute
    </script>
</body>
</html>
